    <style>
        @import url('https://fonts.googleapis.com/css2?family=Norican:wght@300;400;500;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .design-container {
            width: 1366px;
            height: 768px;
            position: relative;
            overflow: hidden;
            background-color: #ffffff;
            
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .design-element {
            position: absolute;
        }
        .text-element {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-element {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .shape-element {
            border-radius: 0;
        }
    </style>
</head>

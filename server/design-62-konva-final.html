<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño design-62-container - Konva</title>
    <script src="https://unpkg.com/konva@9/konva.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        #design-container {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin: 0 auto;
            width: fit-content;
        }
        .info {
            text-align: center;
            margin-bottom: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="info">
        <h2>Diseño design-62-container - Konva Native</h2>
        <p>Dimensiones: 1080x1080px</p>
    </div>
    
    <div id="design-container"></div>
    
    <script>
        // JSON del diseño en formato Konva
        const konvaJson = "{\"attrs\":{\"width\":1080,\"height\":1080},\"className\":\"Stage\",\"children\":[{\"attrs\":{},\"className\":\"Layer\",\"children\":[{\"attrs\":{\"x\":668.9565937078539,\"y\":24.392312403917614,\"width\":573,\"height\":189,\"rotation\":0,\"opacity\":1,\"visible\":true,\"text\":\"NEVER\",\"fontSize\":156,\"fontFamily\":\"ZCOOL KuaiLe\",\"fill\":\"rgba(246,22,29,1)\",\"align\":\"left\"},\"className\":\"Text\"},{\"attrs\":{\"x\":636.0000000000001,\"y\":157.21119578587826,\"width\":639,\"height\":273,\"rotation\":0,\"opacity\":1,\"visible\":true,\"text\":\"LOSE\",\"fontSize\":226,\"fontFamily\":\"ZCOOL KuaiLe\",\"fill\":\"rgba(246,22,29,1)\",\"align\":\"left\"},\"className\":\"Text\"},{\"attrs\":{\"x\":635.9999999900001,\"y\":443.61639876892275,\"width\":648,\"height\":293,\"rotation\":0,\"opacity\":1,\"visible\":true,\"text\":\"HOPE\",\"fontSize\":243,\"fontFamily\":\"Zilla Slab Highlight\",\"fill\":\"rgba(246,22,29,1)\",\"align\":\"left\"},\"className\":\"Text\"},{\"attrs\":{\"x\":97.52895752895607,\"y\":282.1411077175109,\"width\":286.279100413095,\"height\":429.41865061964245,\"rotation\":0,\"opacity\":1,\"visible\":true,\"src\":\"https://images.unsplash.com/photo-1755353426706-97e4d704f463?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3wxMTY5OTZ8MHwxfGFsbHwzfHx8fHx8fHwxNzU2MTQxMjcyfA&ixlib=rb-4.1.0&q=80&w=1080\"},\"className\":\"Image\"},{\"attrs\":{\"x\":1475.918162449028,\"y\":330.1940425025989,\"width\":360.6841541532968,\"height\":368.8933987373664,\"rotation\":0,\"opacity\":1,\"visible\":true,\"src\":\"https://images.unsplash.com/photo-1755918546836-fb909c73e999?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3wxMTY5OTZ8MHwxfGFsbHwxMHx8fHx8fHx8MTc1NjE0MTI3Mnw&ixlib=rb-4.1.0&q=80&w=1080\"},\"className\":\"Image\"},{\"attrs\":{\"x\":851.4983912483892,\"y\":852.4851899410935,\"width\":217.00321750322178,\"height\":214.42728442728648,\"rotation\":0,\"opacity\":0.5,\"visible\":true,\"fill\":\"rgba(223,26,26,1)\",\"stroke\":\"#0c0c0c\",\"strokeWidth\":1},\"className\":\"Rect\"}]}]}";
        
        console.log('Creando stage con JSON:', konvaJson);
        
        try {
            // Crear el stage usando Konva.Node.create()
            const stage = Konva.Node.create(konvaJson, 'design-container');
            console.log('Stage creado exitosamente:', stage);
            
            // Manejar la carga de imágenes si es necesario
            const images = stage.find('Image');
            images.forEach(imageNode => {
                const src = imageNode.getAttr('src');
                if (src) {
                    const img = new Image();
                    img.onload = () => {
                        imageNode.image(img);
                        stage.batchDraw();
                    };
                    img.src = src;
                }
            });
            
        } catch (error) {
            console.error('Error al crear el stage:', error);
            document.getElementById('design-container').innerHTML = 
                '<p style="color: red;">Error: ' + error.message + '</p>';
        }
    </script>
</body>
</html>

services:
  - type: web
    name: kazescreen-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PROVIDER
        value: postgres
      - key: SUPABASE_PROJECT_ID
        value: qorqkcywoefkficspepx
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: DB_SSL
        value: true
      - key: BUSINESS_NAME
        value: Mi Local
      - key: BUSINESS_TIMEZONE
        value: America/Buenos_Aires
      - key: BUSINESS_CURRENCY
        value: ARS
      - key: UPLOAD_PROVIDER
        value: supabase
      - key: SUPABASE_URL
        value: https://qorqkcywoefkficspepx.supabase.co
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: uploads
      - key: MAX_FILE_SIZE
        value: 5242880
      - key: SOCKET_CORS_ORIGIN
        sync: false
      - key: CLIENT_URL
        sync: false
